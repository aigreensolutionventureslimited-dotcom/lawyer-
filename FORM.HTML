    body { margin:0; padding:0; background-color:#f6f5f3; font-family:Arial,sans-serif; color:#2c2c2c; }

    /* ===== LOGIN SCREEN ===== */

    .login-header {

    .login-error { display:none; background:#fdf0f0; border-left:3px solid #c62828; color:#c62828; font-size:12px; padding:10px 14px; margin-top:14px; border-radius:2px; }
